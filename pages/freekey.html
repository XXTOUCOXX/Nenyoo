<!DOCTYPE html>

<head>

    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #f4b400;
            --accent: #a78bfa;
            --dark: #0a0a0a;
            --darker: #050505;
            --light: #ffffff;
            --gray: #7f8c8d;
            --dark-gray: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: var(--light);
            background: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--darker);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 100%;
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(167, 139, 250, 0.5));
        }

        .page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--gray);
            font-size: 1em;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(30, 30, 30, 0.8);
            border-radius: 15px;
            padding: 40px 30px;
            border: 1px solid rgba(167, 139, 250, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            margin-bottom: 30px;
        }

        .countdown-wrapper {
            margin-bottom: 30px;
        }

        .countdown-label {
            font-size: 1em;
            color: var(--gray);
            margin-bottom: 15px;
        }

        .countdown-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 4em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .countdown-ring {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            position: relative;
        }

        .countdown-ring svg {
            transform: rotate(-90deg);
            width: 140px;
            height: 140px;
        }

        .countdown-ring circle {
            fill: none;
            stroke-width: 6;
        }

        .countdown-ring .ring-bg {
            stroke: rgba(167, 139, 250, 0.15);
        }

        .countdown-ring .ring-progress {
            stroke: var(--accent);
            stroke-dasharray: 408;
            stroke-dashoffset: 0;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .countdown-ring .ring-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            color: var(--light);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 40px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1em;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
            max-width: 350px;
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
            color: var(--light);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover:not(.btn-locked)::before {
            left: 100%;
        }

        .btn-key {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4);
        }

        .btn-key:hover:not(.btn-locked) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.6);
        }

        .btn-locked {
            background: linear-gradient(135deg, #333, #444) !important;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3) !important;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-locked i {
            animation: none;
        }

        @keyframes pulse-btn {
            0% { box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }
            50% { box-shadow: 0 5px 25px rgba(124, 58, 237, 0.7); }
            100% { box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }
        }

        .btn-unlocked {
            animation: pulse-btn 2s ease-in-out infinite;
        }

        .unlocked-text {
            display: none;
            color: #2ecc71;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .unlocked-text.show {
            display: block;
        }

        .ad-warning {
            background: rgba(231, 76, 60, 0.15);
            border: 2px solid #e74c3c;
            border-radius: 10px;
            padding: 12px 20px;
            margin-top: 20px;
            text-align: center;
            color: #e74c3c;
            font-weight: 700;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        .ad-warning i {
            margin-right: 6px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-link:hover {
            color: var(--accent);
        }

        .ad-banner {
            margin: 20px auto;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.6em;
            }

            .card {
                padding: 25px 20px;
            }

            .countdown-ring {
                width: 120px;
                height: 120px;
            }

            .countdown-ring svg {
                width: 120px;
                height: 120px;
            }

            .countdown-ring .ring-number {
                font-size: 2em;
            }

            .btn {
                font-size: 1em;
                padding: 14px 30px;
            }
        }
    </style>

</head>
<body>
    <div id="particles-js"></div>

    <div class="container">
        <img src="../images/free.png" alt="N3NY000 Free" class="logo">
        <h1 class="page-title">FREE KEY</h1>
        <p class="page-subtitle">Please wait for your key to be generated</p>

        <div class="card">
            <div class="countdown-wrapper">
                <p class="countdown-label"><i class="fas fa-hourglass-half"></i> Generating your key...</p>
                <div class="countdown-ring">
                    <svg>
                        <circle class="ring-bg" cx="70" cy="70" r="65"></circle>
                        <circle class="ring-progress" cx="70" cy="70" r="65"></circle>
                    </svg>
                    <span class="ring-number" id="countdown">5</span>
                </div>
            </div>

            <p class="unlocked-text" id="unlockedText"><i class="fas fa-check-circle"></i> Key ready! Click the button below.</p>

            <a href="https://bstlar.com/F/N3NYOOfreeKEY" target="_blank" class="btn btn-key btn-locked" id="keyBtn" onclick="return !this.classList.contains('btn-locked');">
                <i class="fas fa-lock" id="lockIcon"></i>
                <span id="btnText">Please Wait...</span>
            </a>

            <div class="ad-warning">
                <i class="fas fa-exclamation-triangle"></i> DO NOT DOWNLOAD AD POPUPS
            </div>
        </div>

        <!-- Native Banner Ad -->
        <div class="ad-banner">
            <script async="async" data-cfasync="false" src="https://aloudalimonyexplosion.com/1c31b0fbf9c2123d551301d55bc6dc08/invoke.js"></script>
            <div id="container-1c31b0fbf9c2123d551301d55bc6dc08"></div>
        </div>

        <a href="free.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Free Version</a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#a78bfa" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.5, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.1 } },
                    "size": { "value": 3, "random": true, "anim": { "enable": true, "speed": 2, "size_min": 0.1 } },
                    "line_linked": { "enable": true, "distance": 150, "color": "#a78bfa", "opacity": 0.4, "width": 1 },
                    "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "out_mode": "out" }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": { "enable": true, "mode": "grab" },
                        "onclick": { "enable": true, "mode": "push" },
                        "resize": true
                    },
                    "modes": {
                        "grab": { "distance": 140, "line_linked": { "opacity": 1 } },
                        "push": { "particles_nb": 4 }
                    }
                },
                "retina_detect": true
            });

            // Countdown logic
            var seconds = 5;
            var countdownEl = document.getElementById('countdown');
            var keyBtn = document.getElementById('keyBtn');
            var lockIcon = document.getElementById('lockIcon');
            var btnText = document.getElementById('btnText');
            var unlockedText = document.getElementById('unlockedText');
            var ringProgress = document.querySelector('.ring-progress');
            var circumference = 2 * Math.PI * 65; // 408.4

            ringProgress.style.strokeDasharray = circumference;
            ringProgress.style.strokeDashoffset = '0';

            var timer = setInterval(function() {
                seconds--;
                countdownEl.textContent = seconds;

                // Update ring progress
                var offset = circumference - (seconds / 5) * circumference;
                ringProgress.style.strokeDashoffset = offset;

                if (seconds <= 0) {
                    clearInterval(timer);
                    countdownEl.textContent = '0';

                    // Unlock the button
                    keyBtn.classList.remove('btn-locked');
                    keyBtn.classList.add('btn-unlocked');
                    lockIcon.className = 'fas fa-unlock';
                    btnText.textContent = 'Get Free Key';
                    unlockedText.classList.add('show');

                    // Update countdown label
                    document.querySelector('.countdown-label').innerHTML = '<i class="fas fa-check-circle" style="color: #2ecc71;"></i> Ready!';
                }
            }, 1000);
        });
    </script>
    <script src="https://aloudalimonyexplosion.com/04/79/bb/0479bb09632f097b9b4dbbc54eec3bb3.js"></script>
