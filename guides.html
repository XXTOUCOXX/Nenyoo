  /* lightbox */

  @keyframes gspin{to{transform:rotate(360deg);}}

<script>
(function(){
  'use strict';
  var ENDPOINT = '/data-variables/discord_fourms';
  var listView = document.getElementById('listView');
  var articleView = document.getElementById('articleView');
  var cardsEl = document.getElementById('cards');
  var searchEl = document.getElementById('search');
  var esc = (window.NenyooAuth && NenyooAuth.escapeHtml) || function(s){
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  };
  var POSTS = [];
  var THREAD_SLUG = {}; // discord thread_id -> internal guide slug

  // ---------- fetch + parse the (double-encoded) data variable ----------
  function loadingState(){
    cardsEl.innerHTML = '<div class="g-state"><div class="g-spin"></div>Loading guides…</div>';
  }
  function errorState(msg){
    cardsEl.innerHTML = '<div class="g-state"><div style="font-size:34px;margin-bottom:12px;">&#9888;&#65039;</div>'+
      '<div style="color:#ECEAF2;font-weight:600;margin-bottom:6px;">Couldn\'t load guides</div>'+
      '<div style="font-size:13px;">'+esc(msg||'')+'</div>'+
      '<div style="margin-top:18px;"><a href="https://discord.gg/mwMcEDUjaa" target="_blank" style="color:#a78bfa;font-weight:600;">Get help on Discord →</a></div></div>';
  }

  async function load(){
    loadingState();
    var res;
    try {
      res = await NenyooAuth.api('GET', ENDPOINT);
    } catch(e){ return errorState('Network error.'); }
    if(!res || !res.ok){
      return errorState(res && res.data && res.data.message ? res.data.message : 'Request failed ('+(res?res.status:'?')+').');
    }
    var value = res.data && res.data.value;
    var parsed;
    try { parsed = (typeof value === 'string') ? JSON.parse(value) : value; }
    catch(e){ return errorState('Guide data is malformed.'); }
    if(!parsed || !Array.isArray(parsed.posts)) return errorState('No guides found.');
    // newest first
    POSTS = parsed.posts.slice().sort(function(a,b){
      return new Date(b.created_at||0) - new Date(a.created_at||0);
    });
    // assign a readable, unique slug to each guide for clean deep-link URLs
    var seen = {};
    POSTS.forEach(function(p){
      var base = slugify(p.title) || ('guide-'+p.thread_id);
      var s = base, i = 2;
      while(seen[s]){ s = base+'-'+(i++); }
      seen[s] = true; p.__slug = s;
      THREAD_SLUG[p.thread_id] = { slug: s, title: p.title || 'guide' };
    });
    render(POSTS);
    routeFromHash();
  }

  function slugify(s){
    return String(s||'').toLowerCase()
      .replace(/[^\w\s-]/g,'')      // drop punctuation/emoji
      .replace(/[\s_]+/g,'-')        // spaces -> dashes
      .replace(/-+/g,'-')
      .replace(/^-+|-+$/g,'')
      .slice(0,60).replace(/-+$/,'');
  }

  // ---------- helpers ----------
  function firstText(post){
    var msgs = post.messages || [];
    for(var i=0;i<msgs.length;i++){ if(msgs[i].content) return msgs[i].content; }
    return '';
  }
  function imgCount(post){
    var n=0;(post.messages||[]).forEach(function(m){
      (m.attachments||[]).forEach(function(a){ if(isImage(a)) n++; });
    });return n;
  }
  function isImage(a){
    var t = (a.original_content_type || a.content_type || '');
    return /^image\//.test(t) || /\.(png|jpe?g|gif|webp|bmp)$/i.test(a.filename||'');
  }
  function authorName(m){
    var a = m && m.author; if(!a) return 'N3NY000';
    return a.global_name || a.username || 'N3NY000';
  }
  function avatarUrl(m){
    var a = m && m.author; if(!a) return '';
    if(a.avatar && a.id) return 'https://cdn.discordapp.com/avatars/'+a.id+'/'+a.avatar+'.png?size=64';
    return '';
  }
  function fmtDate(ts){
    var d = new Date(ts); if(isNaN(d)) return '';
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }
  // pull unique YouTube videos (id + optional start time) out of message text
  function youtubeEmbeds(content){
    var re = /(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/))([\w-]{6,})([^\s<)]*)/gi;
    var out = [], seen = {}, m;
    while((m = re.exec(String(content||'')))){
      var id = m[1], rest = m[2] || '', start = 0;
      var t = rest.match(/[?&]t=(\d+)/); if(t) start = +t[1];
      if(!seen[id]){ seen[id] = 1; out.push({ id: id, start: start }); }
    }
    return out;
  }

  // remove Discord-only inline tokens for plain-text snippets:
  // custom emoji <a:name:id>, mentions <@user>/<#channel>/<@&role>, timestamps <t:..>
  function stripDiscordTokens(s){
    return String(s||'')
      .replace(/<a?:\w+:\d+>/g,'')
      .replace(/<(?:@[!&]?|#)\d+>/g,'')
      .replace(/<t:\d+(?::[a-zA-Z])?>/g,'');
  }
  // strip discord markdown to a plain snippet (for cards)
  function snippet(txt){
    return stripDiscordTokens(String(txt||''))
      .replace(/```[\s\S]*?```/g,' ')
      .replace(/[*_~`>#]/g,'')
      .replace(/\[([^\]]+)\]\([^)]+\)/g,'$1')
      .replace(/\s+/g,' ').trim();
  }

  // ---------- lightweight discord markdown renderer ----------
  function renderMarkdown(raw){
    if(!raw) return '';
    // pull out code blocks first (placeholder @@CB<n>@@ survives escaping/markdown)
    var blocks = [];
    raw = raw.replace(/```(?:[a-zA-Z0-9]+\n)?([\s\S]*?)```/g, function(_,c){
      blocks.push('<pre>'+esc(c.replace(/\n$/,''))+'</pre>'); return '@@CB'+(blocks.length-1)+'@@';
    });
    // ``double-backtick`` inline code spans, extracted at content level with a
    // lazy match so adjacent spans don't merge and multi-line spans still work.
    raw = raw.replace(/``([\s\S]+?)``/g, function(_,c){
      c = c.trim();
      var tag = c.indexOf('\n') >= 0 ? ('<pre>'+esc(c)+'</pre>') : ('<code>'+esc(c)+'</code>');
      blocks.push(tag); return '@@CB'+(blocks.length-1)+'@@';
    });
    var lines = raw.split('\n');
    var out = [], inList = false;
    function closeList(){ if(inList){ out.push('</ul>'); inList=false; } }
    for(var i=0;i<lines.length;i++){
      var ln = lines[i];
      var m;
      if(/^@@CB\d+@@$/.test(ln.trim())){ closeList(); out.push(ln.trim()); continue; }
      if(ln.trim()===''){ closeList(); out.push('<div style="height:8px"></div>'); continue; }
      if((m=ln.match(/^###\s+(.*)/))){ closeList(); out.push('<h3>'+inline(m[1])+'</h3>'); continue; }
      if((m=ln.match(/^##\s+(.*)/))){ closeList(); out.push('<h2>'+inline(m[1])+'</h2>'); continue; }
      if((m=ln.match(/^#\s+(.*)/))){ closeList(); out.push('<h1>'+inline(m[1])+'</h1>'); continue; }
      if((m=ln.match(/^-#\s+(.*)/))){ closeList(); out.push('<div class="sub">'+inline(m[1])+'</div>'); continue; }
      if((m=ln.match(/^\s*[-*]\s+(.*)/))){ if(!inList){ out.push('<ul>'); inList=true; } out.push('<li>'+inline(m[1])+'</li>'); continue; }
      if((m=ln.match(/^>\s?(.*)/))){ closeList(); out.push('<div style="border-left:3px solid rgba(139,92,246,0.5);padding-left:12px;color:#b8b1c6;">'+inline(m[1])+'</div>'); continue; }
      closeList(); out.push('<div>'+inline(ln)+'</div>');
    }
    closeList();
    var html = out.join('');
    html = html.replace(/@@CB(\d+)@@/g, function(_,n){ return blocks[+n]; });
    return html;
  }

  function inline(s){
    s = String(s||'');
    // mentions / timestamps: strip (no name resolution available client-side)
    s = s.replace(/<(?:@[!&]?|#)\d+>/g,'').replace(/<t:\d+(?::[a-zA-Z])?>/g,'');
    // custom emoji -> placeholder now, real <img> after escaping.
    // <a:name:id> = animated (.gif), <:name:id> = static (.png).
    var emojis = [];
    s = s.replace(/<(a)?:(\w+):(\d+)>/g, function(_, anim, name, id){
      var ext = anim ? 'gif' : 'png';
      emojis.push('<img class="g-emoji" src="https://cdn.discordapp.com/emojis/'+id+'.'+ext+'?size=48" alt=":'+esc(name)+':" title=":'+esc(name)+':" loading="lazy" onerror="this.style.display=\'none\'">');
      return '@@EMO'+(emojis.length-1)+'@@';
    });
    s = esc(s);
    // inline code (handles single AND multi-backtick spans like ``code``)
    s = s.replace(/(`+)([^`]+?)\1/g,'<code>$2</code>');
    // masked links [text](url)
    s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    // bold / italic / strike
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
    s = s.replace(/__([^_]+)__/g,'<strong>$1</strong>');
    s = s.replace(/~~([^~]+)~~/g,'<s>$1</s>');
    // bare urls — protect existing <a>/<code> spans, then linkify every URL
    // regardless of the preceding char (handles URLs glued to </code>, etc.),
    // then restore the protected spans. Avoids nested/broken anchors.
    var prot = [];
    s = s.replace(/<(a|code)\b[^>]*>[\s\S]*?<\/\1>/g, function(m){
      prot.push(m); return '@@P'+(prot.length-1)+'@@';
    });
    s = s.replace(/(https?:\/\/[^\s<)]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/@@P(\d+)@@/g, function(_,n){ return prot[+n]; });
    // rewrite Discord channel links that point to one of our guides into
    // internal #slug links (so they navigate within the site, not to Discord).
    // discord.com/channels/<guild>/<thread>[/<message>]
    s = s.replace(/<a href="https?:\/\/(?:www\.|canary\.|ptb\.)?discord(?:app)?\.com\/channels\/\d+\/(\d+)(?:\/\d+)?[^"]*"[^>]*>([\s\S]*?)<\/a>/g,
      function(full, threadId, text){
        var g = THREAD_SLUG[threadId];
        if(!g) return full; // not one of our guides -> leave as external Discord link
        // if the visible text was just the raw URL, show the guide title instead
        var label = /^https?:\/\//.test(text.trim()) ? ('&#128279; '+esc(g.title)) : text;
        return '<a href="#'+g.slug+'" class="g-xlink">'+label+'</a>';
      });
    // restore custom-emoji images
    s = s.replace(/@@EMO(\d+)@@/g, function(_,n){ return emojis[+n]; });
    return s;
  }

  // ---------- list render ----------
  function render(posts){
    if(!posts.length){ cardsEl.innerHTML = '<div class="g-state">No guides match your search.</div>'; return; }
    var grid = document.createElement('div'); grid.className='g-grid';
    posts.forEach(function(p){
      var imgs = imgCount(p);
      var btn = document.createElement('button');
      btn.className='g-card';
      btn.onclick = function(){ location.hash = p.__slug; };
      btn.innerHTML =
        '<h3>'+esc(p.title||'Untitled')+'</h3>'+
        '<p class="g-snip">'+esc(snippet(firstText(p)).slice(0,160))+'</p>'+
        '<div class="g-meta">'+
          '<span class="g-chip">'+(p.message_count||(p.messages||[]).length||0)+' replies</span>'+
          (imgs?'<span class="g-chip img">&#128247; '+imgs+'</span>':'')+
          '<span class="g-chip">'+esc(fmtDate(p.created_at))+'</span>'+
        '</div>';
      grid.appendChild(btn);
    });
    cardsEl.innerHTML=''; cardsEl.appendChild(grid);
  }

  // ---------- article render ----------
  function openArticle(post){
    var html = '<div class="g-article">'+
      '<button class="g-back" onclick="location.hash=\'\'">&larr; All guides</button>'+
      '<h1 style="font-family:\'Space Grotesk\',sans-serif;font-weight:700;font-size:30px;line-height:1.2;margin:0 0 8px;">'+esc(post.title||'Untitled')+'</h1>'+
      '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:#7d768c;margin-bottom:26px;">'+esc(fmtDate(post.created_at))+' · '+(post.message_count||(post.messages||[]).length||0)+' messages</div>';

    (post.messages||[]).forEach(function(m){
      var av = avatarUrl(m);
      var imgs = (m.attachments||[]).filter(isImage);
      var files = (m.attachments||[]).filter(function(a){ return !isImage(a); });
      html += '<div class="g-msg">'+
        '<div class="g-msg-head">'+
          (av?'<img class="g-av" src="'+esc(av)+'" alt="" onerror="this.style.display=\'none\'">':'<div class="g-av"></div>')+
          '<div><div class="g-author">'+esc(authorName(m))+'</div>'+
          '<div class="g-time">'+esc(fmtDate(m.timestamp))+'</div></div>'+
        '</div>'+
        '<div class="g-body">'+renderMarkdown(m.content)+'</div>';
      // embed any YouTube videos referenced in this message
      youtubeEmbeds(m.content).forEach(function(vd){
        html += '<div class="g-video"><iframe src="https://www.youtube-nocookie.com/embed/'+esc(vd.id)+
          (vd.start?('?start='+vd.start):'')+'" title="YouTube video" loading="lazy" '+
          'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" '+
          'referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div>';
      });
      if(imgs.length){
        html += '<div class="g-imgs">';
        imgs.forEach(function(a){
          var u = a.url || a.proxy_url;
          html += '<img loading="lazy" src="'+esc(u)+'" alt="'+esc(a.filename||'')+'" onclick="window.__lb(this.src)" onerror="this.style.display=\'none\'">';
        });
        html += '</div>';
      }
      files.forEach(function(a){
        html += '<a class="g-file" href="'+esc(a.url||a.proxy_url||'#')+'" target="_blank" rel="noopener">&#128206; '+esc(a.filename||'attachment')+'</a>';
      });
      html += '</div>';
    });
    html += '</div>';
    articleView.innerHTML = html;
    listView.style.display='none';
    articleView.style.display='';
    window.scrollTo(0,0);
  }

  // ---------- routing (deep links) ----------
  function routeFromHash(){
    var h = decodeURIComponent(location.hash.replace(/^#/,''));
    if(h){
      // match by slug, with backward-compat for old guide/<thread_id> links
      var legacy = h.match(/^guide\/(\d+)$/);
      var post = POSTS.filter(function(p){
        return p.__slug === h || (legacy && String(p.thread_id) === legacy[1]);
      })[0];
      if(post){
        if(legacy) { location.replace('#'+post.__slug); return; } // upgrade old URL
        openArticle(post); return;
      }
    }
    // list
    articleView.style.display='none';
    listView.style.display='';
  }
  window.addEventListener('hashchange', routeFromHash);

  // ---------- search ----------
  var t;
  searchEl.addEventListener('input', function(){
    clearTimeout(t);
    t = setTimeout(function(){
      var q = searchEl.value.trim().toLowerCase();
      if(!q){ render(POSTS); return; }
      render(POSTS.filter(function(p){
        var hay = (p.title||'')+' '+firstText(p);
        return hay.toLowerCase().indexOf(q) !== -1;
      }));
    }, 120);
  });

  // ---------- lightbox ----------
  var lb = document.getElementById('lightbox'), lbImg = document.getElementById('lightboxImg');
  window.__lb = function(src){ lbImg.src=src; lb.classList.add('on'); };
  lb.addEventListener('click', function(){ lb.classList.remove('on'); lbImg.src=''; });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') lb.classList.remove('on'); });

  load();
})();
</script>
</body>
</html>
