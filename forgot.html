<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recover · N3NY000</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-root">
<canvas id="fx" class="fx-canvas"></canvas>
<canvas id="catFx" class="fx-canvas"></canvas>

<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;z-index:1;">
  <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:680px;max-width:95vw;height:420px;background:radial-gradient(ellipse,rgba(124,58,237,0.2),transparent 60%);filter:blur(10px);pointer-events:none;"></div>
  <div style="position:relative;width:100%;max-width:410px;animation:fadeUp .5s ease both;">
    <a href="/" style="display:flex;align-items:center;justify-content:center;gap:11px;cursor:pointer;margin-bottom:28px;">
      <img src="uploads/Logo.png" alt="Nenyoo" style="width:40px;height:40px;display:block;border:1px solid rgba(255,255,255,0.1);" />
      <span style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:0.02em;text-transform:uppercase;">N3NY000</span>
    </a>
    <div style="background:#0b0813;border:1px solid rgba(255,255,255,0.1);padding:36px;">

      <!-- ===== STEP 1: request reset code ===== -->
      <div id="requestView">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:0.14em;color:#8b5cf6;margin-bottom:10px;text-align:center;">[ RECOVER ]</div>
        <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin:0 0 6px;text-align:center;">Forgot password</h1>
        <p style="font-size:14px;color:#9b94ab;margin:0 0 28px;text-align:center;line-height:1.55;">Enter the email or username on your account and we'll send a reset code.</p>
        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:0.06em;color:#c4bdd1;margin-bottom:8px;">EMAIL OR USERNAME</label>
        <input id="identifier" type="text" placeholder="you@example.com" style="width:100%;background:#07060c;border:1px solid rgba(255,255,255,0.12);padding:13px 14px;color:#ECEAF2;font-family:inherit;font-size:15px;margin-bottom:12px;" />
        <div id="requestMsg" style="display:none;font-size:12.5px;font-weight:600;margin-bottom:10px;"></div>
        <button id="requestBtn" type="button" style="cursor:pointer;width:100%;background:linear-gradient(180deg,#9a6cf3,#7c3aed);border:none;color:#fff;font-family:inherit;font-size:15px;font-weight:600;padding:14px;box-shadow:0 8px 26px rgba(124,58,237,0.4);">Send reset code</button>
      </div>

      <!-- ===== STEP 2: enter code + new password ===== -->
      <div id="resetView" style="display:none;">
        <div style="font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:0.14em;color:#8b5cf6;margin-bottom:10px;text-align:center;">[ RESET ]</div>
        <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:25px;text-transform:uppercase;margin:0 0 6px;text-align:center;">Set a new password</h1>
        <p style="font-size:14px;color:#9b94ab;margin:0 0 24px;text-align:center;line-height:1.55;">Enter the code we sent and choose a new password.</p>
        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:0.06em;color:#c4bdd1;margin-bottom:8px;">RESET CODE</label>
        <input id="resetCode" type="text" inputmode="numeric" placeholder="000000" style="width:100%;background:#07060c;border:1px solid rgba(255,255,255,0.12);padding:13px 14px;color:#ECEAF2;font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:0.3em;text-align:center;margin-bottom:16px;" />
        <label style="display:block;font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:0.06em;color:#c4bdd1;margin-bottom:8px;">NEW PASSWORD</label>
        <input id="newPass" type="password" placeholder="At least 8 characters" style="width:100%;background:#07060c;border:1px solid rgba(255,255,255,0.12);padding:13px 14px;color:#ECEAF2;font-family:inherit;font-size:15px;margin-bottom:12px;" />
        <div id="resetMsg" style="display:none;font-size:12.5px;font-weight:600;margin-bottom:10px;"></div>
        <button id="resetBtn" type="button" style="cursor:pointer;width:100%;background:linear-gradient(180deg,#9a6cf3,#7c3aed);border:none;color:#fff;font-family:inherit;font-size:15px;font-weight:600;padding:14px;box-shadow:0 8px 26px rgba(124,58,237,0.4);margin-bottom:12px;">Reset password</button>
        <button id="resendBtn" type="button" style="cursor:pointer;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.14);color:#ECEAF2;font-family:inherit;font-size:14px;font-weight:600;padding:12px;">Resend code</button>
      </div>

    </div>
    <p style="text-align:center;font-size:14px;color:#9b94ab;margin-top:22px;display:flex;align-items:center;justify-content:center;gap:7px;">
      <a href="/login" style="color:#a78bfa;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="#a78bfa" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="round"/></svg>
        Back to login
      </a>
    </p>
  </div>
</main>

</div>
<script src="app.js"></script>
<script src="auth.js"></script>
<script>
(function(){
  var A = window.NenyooAuth;
  var requestView = document.getElementById('requestView');
  var resetView = document.getElementById('resetView');
  var requestMsg = document.getElementById('requestMsg');
  var resetMsg = document.getElementById('resetMsg');
  var identifier = '';

  function show(el, msg, ok){ el.style.display = 'block'; el.style.color = ok ? '#5ee0a8' : '#f0857d'; el.textContent = msg; }
  function busy(btn, on, label){ btn.disabled = on; btn.style.opacity = on ? '0.6' : '1'; if(label!=null) btn.textContent = label; }
  function idBody(id){ return id.indexOf('@') !== -1 ? { email: id } : { username: id }; }

  async function doRequest(){
    identifier = document.getElementById('identifier').value.trim();
    requestMsg.style.display = 'none';
    if(!identifier){ show(requestMsg, 'Please enter your email or username.'); return; }
    var btn = document.getElementById('requestBtn');
    busy(btn, true, 'Sending…');
    var r = await A.api('POST', '/auth/password-reset/request', idBody(identifier));
    busy(btn, false, 'Send reset code');
    if(r.ok){
      requestView.style.display = 'none';
      resetView.style.display = 'block';
      if(r.data.debug_code) show(resetMsg, 'Dev code: ' + r.data.debug_code, true);
    } else {
      show(requestMsg, r.data.message || 'Failed to send reset code.');
    }
  }

  async function doReset(){
    var code = document.getElementById('resetCode').value.trim();
    var newPass = document.getElementById('newPass').value;
    resetMsg.style.display = 'none';
    if(!code){ show(resetMsg, 'Please enter the reset code.'); return; }
    if(!newPass || newPass.length < 8){ show(resetMsg, 'New password must be at least 8 characters.'); return; }
    var body = { code: code, new_password: newPass };
    if(identifier.indexOf('@') !== -1) body.email = identifier; else body.username = identifier;
    var btn = document.getElementById('resetBtn');
    busy(btn, true, 'Resetting…');
    var r = await A.api('POST', '/auth/password-reset/confirm', body);
    busy(btn, false, 'Reset password');
    if(r.ok){
      show(resetMsg, 'Password reset! Redirecting to login…', true);
      setTimeout(function(){ window.location.href = '/login'; }, 1000);
    } else {
      show(resetMsg, r.data.message || 'Failed to reset password.');
    }
  }

  async function doResend(){
    var btn = document.getElementById('resendBtn');
    busy(btn, true, 'Sending…');
    var r = await A.api('POST', '/auth/password-reset/request', idBody(identifier));
    busy(btn, false, 'Resend code');
    show(resetMsg, r.ok ? 'Reset code sent!' : (r.data.message || 'Failed to resend code.'), r.ok);
  }

  document.getElementById('requestBtn').addEventListener('click', doRequest);
  document.getElementById('identifier').addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); doRequest(); } });
  document.getElementById('resetBtn').addEventListener('click', doReset);
  document.getElementById('newPass').addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); doReset(); } });
  document.getElementById('resendBtn').addEventListener('click', doResend);
})();
</script>
</body>
</html>
